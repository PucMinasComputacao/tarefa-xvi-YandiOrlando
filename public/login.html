<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Trabalho Prático</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .login-box {
      background: #2a475e;
      border: 1px solid #3b5a74;
      border-radius: 12px;
      padding: 40px;
      max-width: 420px;
      margin: 80px auto;
    }
    .login-box h3 {
      color: #66c0f4;
      margin-bottom: 28px;
      text-align: center;
      font-weight: bold;
    }
    .form-label { color: #c7d5e0; }
    .form-control {
      background: #1b2838;
      border: 1px solid #3b5a74;
      color: #c7d5e0;
    }
    .form-control:focus {
      background: #1b2838;
      border-color: #66c0f4;
      color: #c7d5e0;
      box-shadow: 0 0 0 0.2rem rgba(102,192,244,0.2);
    }
    .btn-login {
      background: #66c0f4;
      color: #171a21;
      font-weight: bold;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
      cursor: pointer;
    }
    .btn-login:hover { background: #4fa8d8; }
    #msg-erro {
      color: #e84040;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <header class="navbar-custom">
    <div class="container">
      <h2 class="logo">Trabalho Prático</h2>
    </div>
  </header>

  <main>
    <div class="login-box">
      <h3>🔒 Entrar</h3>
      <div class="mb-3">
        <label class="form-label" for="input-login">Login</label>
        <input type="text" id="input-login" class="form-control" placeholder="Digite seu login">
      </div>
      <div class="mb-3">
        <label class="form-label" for="input-senha">Senha</label>
        <input type="password" id="input-senha" class="form-control" placeholder="Digite sua senha">
      </div>
      <button class="btn-login" id="btn-entrar">Entrar</button>
      <p id="msg-erro"></p>
    </div>
  </main>

  <script src="assets/js/login.js"></script>
  <script>
    if (getUsuarioCorrente()) {
      window.location.href = "index.html";
    }

    document.getElementById("btn-entrar").addEventListener("click", async () => {
      const login = document.getElementById("input-login").value.trim();
      const senha = document.getElementById("input-senha").value.trim();
      const msgErro = document.getElementById("msg-erro");

      if (!login || !senha) {
        msgErro.textContent = "Preencha login e senha.";
        msgErro.style.display = "block";
        return;
      }

      const usuario = await loginUser(login, senha);

      if (usuario) {
        window.location.href = "index.html";
      } else {
        msgErro.textContent = "Login ou senha inválidos. Tente novamente.";
        msgErro.style.display = "block";
      }
    });

    document.getElementById("input-senha").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-entrar").click();
    });
  </script>

</body>
</html>
