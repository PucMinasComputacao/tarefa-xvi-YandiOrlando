<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Desenvolvedor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <header class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" style="text-decoration:none;">
        <h2 class="logo">Trabalho Prático</h2>
      </a>
      <nav class="d-flex align-items-center gap-3">
        <a href="index.html">Início</a>
        <a href="index.html#cards">Desenvolvedores</a>
        <a href="favoritos.html">★ Favoritos</a>
        <span id="login-status"></span>
      </nav>
    </div>
  </header>

  <main class="container my-5">
    <section id="detalhes-container"></section>

    <section class="mt-5">
      <h3 class="section-title">Principais Obras</h3>
      <div class="row mt-4" id="atracoes-container"></div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-editar">
    <div class="modal-box">
      <h4>Editar Desenvolvedor</h4>
      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" id="edit-nome" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Descrição curta</label>
        <input type="text" id="edit-descricao" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Conteúdo (texto longo)</label>
        <textarea id="edit-conteudo" class="form-control" rows="4"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">País</label>
        <input type="text" id="edit-pais" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">URL da Imagem</label>
        <input type="text" id="edit-imagem" class="form-control">
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="edit-destaque">
        <label class="form-check-label" for="edit-destaque" style="color:#c7d5e0;">Exibir no carrossel de destaques</label>
      </div>
      <div class="modal-footer-btns">
        <button class="btn-cancelar" id="btn-cancelar-editar">Cancelar</button>
        <button class="btn-salvar" id="btn-salvar-editar">Salvar alterações</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-deletar">
    <div class="confirm-box">
      <h4>Excluir desenvolvedor?</h4>
      <p id="confirm-delete-msg">Essa ação não pode ser desfeita.</p>
      <div class="modal-footer-btns" style="justify-content:center;">
        <button class="btn-cancelar" id="btn-cancelar-deletar">Cancelar</button>
        <button class="btn-deletar" id="btn-confirmar-deletar">Sim, excluir</button>
      </div>
    </div>
  </div>

  <div id="toast-notif" class="toast-notif" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/login.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    renderLoginStatus();
  </script>

</body>
</html>
